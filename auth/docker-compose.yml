services:
  auth-db:
    image: postgres
    container_name: auth-db
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/auth/db:/var/lib/postgresql
    shm_size: 128mb
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - labnet
  auth-api:
    image: ghcr.io/hisbaan/auth/api:latest
    container_name: auth-api
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:postgres@auth-db:5432/postgres?sslmode=disable
      - PORT=3000
      - BASE_URL=https://api.auth.hisbaan.com
      - JWT_SIGNING_KEY_FILE=/keys/private.pem
      - JWT_SIGNING_KEY_ID=01KJP7JK1ACWTTK5AH78CF0WQH
      - ISSUER_URL=https://api.auth.hisbaan.com
      - FRONTEND_URL=https://auth.hisbaan.com
      - COOKIE_DOMAIN=api.auth.hisbaan.com
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=auth@mail.hisbaan.com
      - SUPPORT_EMAIL=support@mail.hisbaan.com
      - SERVICE_NAME=auth.hisbaan.com
    volumes:
      - /mnt/nas/docker/auth/keys:/keys
    networks:
      - labnet
networks:
  labnet:
    external: true
