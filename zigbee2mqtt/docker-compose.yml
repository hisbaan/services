services:
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto
    restart: unless-stopped
    ports:
      - 1883:1883
    volumes:
      - /mnt/nas/docker/mosquitto/config:/mosquitto/config
      - /mnt/nas/docker/mosquitto/data:/mosquitto/data
      - /mnt/nas/docker/mosquitto/log:/mosquitto/log
    networks:
      - labnet
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      # Frontend port
      - 8081:8080
    environment:
      - TZ=America/Toronto
    depends_on:
      - mosquitto
    networks:
      - labnet

networks:
  labnet:
    external: true
