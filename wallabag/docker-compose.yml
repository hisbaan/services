services:
  wallabag:
    image: wallabag/wallabag
    restart: unless-stopped
    environment:
      - SYMFONY__ENV__DATABASE_DRIVER=pdo_pgsql
      - SYMFONY__ENV__DATABASE_HOST=wallabag-db
      - SYMFONY__ENV__DATABASE_PORT=5432
      - SYMFONY__ENV__DATABASE_NAME=wallabag
      - SYMFONY__ENV__DATABASE_USER=wallabag
      - SYMFONY__ENV__DATABASE_PASSWORD=wallapass
      - SYMFONY__ENV__DATABASE_TABLE_PREFIX="wallabag_"
      - SYMFONY__ENV__MAILER_DSN=${SMTP_URL}
      - SYMFONY__ENV__FROM_EMAIL=wallabag@mail.hisbaan.com
      - SYMFONY__ENV__TWOFACTOR_SENDER=wallabag@mail.hisbaan.com
      - SYMFONY__ENV__DOMAIN_NAME=https://wallabag.hisbaan.com
      - SYMFONY__ENV__REDIS_HOST=wallabag-redis
      - SYMFONY__ENV__SERVER_NAME="Wallabag"
      - POPULATE_DATABASE=False
    # ports:
    #   - "80"
    volumes:
      - /mnt/nas/docker/wallabag/images:/var/www/wallabag/web/assets/images
    depends_on:
      wallabag-db:
        condition: service_healthy
      wallabag-redis:
        condition: service_healthy
    networks:
      # labnet:
      #   ipv4_address: 172.20.0.15
      - labnet
  wallabag-db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=wallabag
      - POSTGRES_USER=wallabag
      - POSTGRES_PASSWORD=wallapass
    volumes:
      - /mnt/nas/docker/wallabag/data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallabag -d wallabag"]
      interval: 20s
      start_period: 30s
      timeout: 3s
    networks:
      # labnet:
      #   ipv4_address: 172.20.0.16
      - labnet
  wallabag-redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
    networks:
      # labnet:
      #   ipv4_address: 172.20.0.17
      - labnet

networks:
  labnet:
    external: true
